services:
  db:
    image: postgres:16-alpine
    container_name: etl_postgres
    environment:
      POSTGRES_DB: etl_db
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/schema_postgres.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d etl_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  etl:
    build: .
    container_name: etl_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: etl_db
      DB_USER: etl_user
      DB_PASSWORD: etl_pass
      PYTHONPATH: /app
      PREFECT_TELEMETRY_ENABLED: "false"
    volumes:
      - ./data:/app/data:ro
    command: python flows/etl_flow.py

volumes:
  pg_data: